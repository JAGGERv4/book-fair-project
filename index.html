<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Genre Survival Diagnostic</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

/* ================= SPRITES ================= */
const sprites = new Image();
sprites.src = "sprites.png";

const SPRITES = {
  player: { x:0, y:0, w:32, h:32, frames:4 },
  enemyRed: { x:0, y:40, w:32, h:32 },
  enemyBlue:{ x:40,y:40,w:32,h:32 },
  bullet:{ x:0,y:80,w:16,h:16 }
};

/* ================= GAME ================= */
let player = { x:W/2, y:H/2, speed:3 };
let enemies = [];
let bullets = [];
let particles = [];

let keys = {};
let score = 0;
let health = 100;

/* animation */
let playerFrame = 0;
let frameTimer = 0;
const frameDelay = 6;

/* ================= INPUT ================= */
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);
document.addEventListener("click", shoot);

/* ================= FUNCTIONS ================= */

function shoot(){
  let target = getClosestEnemy();
  let angle = target
    ? Math.atan2(target.y-player.y, target.x-player.x)
    : 0;

  bullets.push({
    x:player.x,
    y:player.y,
    vx:Math.cos(angle)*6,
    vy:Math.sin(angle)*6
  });
}

function getClosestEnemy(){
  let closest=null, min=Infinity;
  for(let e of enemies){
    let d=Math.hypot(e.x-player.x,e.y-player.y);
    if(d<min){ min=d; closest=e; }
  }
  return closest;
}

function spawnEnemy(){
  enemies.push({
    x:Math.random()*W,
    y:Math.random()*H,
    r:12,
    isBlue:Math.random()<0.2,
    health:1
  });
}

/* ================= UPDATE ================= */
function update(){

  // movement
  let dx=0, dy=0;
  if(keys["w"]||keys["ArrowUp"]) dy--;
  if(keys["s"]||keys["ArrowDown"]) dy++;
  if(keys["a"]||keys["ArrowLeft"]) dx--;
  if(keys["d"]||keys["ArrowRight"]) dx++;

  let len=Math.hypot(dx,dy)||1;
  player.x+=player.speed*(dx/len);
  player.y+=player.speed*(dy/len);

  // animation
  if(dx||dy){
    frameTimer++;
    if(frameTimer>=frameDelay){
      playerFrame=(playerFrame+1)%4;
      frameTimer=0;
    }
  } else playerFrame=0;

  // bullets
  bullets.forEach(b=>{
    b.x+=b.vx;
    b.y+=b.vy;
  });

  // enemies move
  enemies.forEach(e=>{
    let dx=player.x-e.x;
    let dy=player.y-e.y;
    let d=Math.hypot(dx,dy);
    e.x+=dx/d;
    e.y+=dy/d;

    if(d<15){
      health-=0.2;
    }
  });

  // collisions
  for(let b of bullets){
    for(let e of enemies){
      let d=Math.hypot(b.x-e.x,b.y-e.y);
      if(d<12){
        e.health--;
        b.dead=true;

        // particles
        for(let i=0;i<6;i++){
          particles.push({
            x:b.x,y:b.y,
            vx:(Math.random()-0.5)*3,
            vy:(Math.random()-0.5)*3,
            life:20
          });
        }

        if(e.health<=0){
          e.dead=true;
          score+=10;
        }
      }
    }
  }

  bullets = bullets.filter(b=>!b.dead);
  enemies = enemies.filter(e=>!e.dead);

  // particles
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });
  particles = particles.filter(p=>p.life>0);

  // spawn enemies
  if(Math.random()<0.02) spawnEnemy();
}

/* ================= DRAW ================= */
function draw(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,W,H);

  // player rotation
  let target=getClosestEnemy();
  let angle=target
    ? Math.atan2(target.y-player.y,target.x-player.x)
    : 0;

  ctx.save();
  ctx.translate(player.x,player.y);
  ctx.rotate(angle);

  ctx.drawImage(
    sprites,
    SPRITES.player.x + playerFrame*32,
    SPRITES.player.y,
    32,32,
    -16,-16,
    32,32
  );

  ctx.restore();

  // enemies
  enemies.forEach(e=>{
    let s = e.isBlue ? SPRITES.enemyBlue : SPRITES.enemyRed;
    ctx.drawImage(sprites, s.x,s.y,s.w,s.h, e.x-12,e.y-12,24,24);
  });

  // bullets
  bullets.forEach(b=>{
    ctx.drawImage(sprites,
      SPRITES.bullet.x,SPRITES.bullet.y,
      16,16,
      b.x-4,b.y-4,8,8
    );
  });

  // particles
  particles.forEach(p=>{
    ctx.fillStyle="orange";
    ctx.fillRect(p.x,p.y,2,2);
  });

  // HUD
  ctx.fillStyle="lime";
  ctx.fillText("Score: "+score,10,20);
  ctx.fillText("Health: "+Math.floor(health),10,40);
}

/* ================= LOOP ================= */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
